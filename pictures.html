<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dirty After Work | Pictures</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Heebo:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shared.css" />

    <style>
      .image-grid {
        display: flex;
        flex-direction: column; /* Forces them into a single column */
        align-items: center; /* Centers the column on the page */
        gap: 40px; /* Spacing between cards */
        padding: 20px 20px 80px 20px; /* Extra padding at bottom for footer clearance */
        box-sizing: border-box;
      }

      .image-card {
        background: #fff; /* White background like the song cards */
        color: #222;
        border-radius: 12px;
        border-left: 10px solid #444; /* Matching the song card accent */
        overflow: hidden;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 600px; /* Sets a consistent width for all cards */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .image-card img {
        display: block;
        width: 100%;
        height: 400px; /* Forces all images to the same height */
        object-fit: cover; /* Crops images to fill the area without stretching */
      }

      .image-caption {
        font-family: "Heebo", sans-serif;
        padding: 20px;
        font-size: 1.1rem;
        font-weight: 700;
        color: #333;
        text-align: center;
      }

      /* Mobile adjustment: make images slightly shorter so they fit better */
      @media (max-width: 600px) {
        .image-card img {
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <header class="page-header">
        <h1>Pictures</h1>
        <button
          class="menu-toggle"
          aria-expanded="false"
          aria-controls="main-menu"
          id="menu-toggle-btn"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </header>

      <nav class="main-nav" id="main-menu">
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="pictures.html">Pictures</a>
        <a href="shows.html">Shows</a>
        <a href="about.html">About</a>
      </nav>

      <div class="content-section">
        <div class="image-grid">
          <div class="image-card">
            <img
              src="/assets/images/Plattsburgh.jpg"
              alt="Finding the Plattsburgh sound"
              onerror="
                this.src =
                  'https://placehold.co/600x400/F0F0F0/333333?text=Image+Missing'
              "
            />
            <div class="image-caption">Finding the Plattsburgh sound.</div>
          </div>

          <div class="image-card">
            <img
              src="/assets/images/TheFourth.jpg"
              alt="Fun hats"
              onerror="
                this.src =
                  'https://placehold.co/600x400/F0F0F0/333333?text=Image+Missing'
              "
            />
            <div class="image-caption">Fun hats.</div>
          </div>

          <div class="image-card">
            <img
              src="/assets/images/IMOnABoat.jpg"
              alt="Dirty on a boat"
              onerror="
                this.src =
                  'https://placehold.co/600x400/F0F0F0/333333?text=Image+Missing'
              "
            />
            <div class="image-caption">Dirty on a boat.</div>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="social-links">
        <a
          href="https://dirtyafterwork.bandcamp.com/album/a-demo"
          target="_blank"
          >Bandcamp</a
        >
      </div>
      <p>&copy; 2026 Dirty After Work. All Rights Reserved.</p>
    </footer>

    <script src="shared.js" defer></script>
  </body>
</html>
