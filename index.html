<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dirty After Work</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Heebo:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shared.css" />

    <style>
      .homepage-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        height: 80vh; /* Adjusted height so it feels centered but fits with footer */
        padding: 20px;
        box-sizing: border-box;
      }

      .main-logo {
        width: 100%;
        max-width: 600px;
        height: auto;
      }

      /* HOVER LOGIC */
      .homepage-content p.scroll-highlight {
        font-family: "Rock Salt", cursive;
        font-size: clamp(1rem, 4vw, 2.2rem);
        margin: 1rem 0 0 0;
        color: rgba(255, 255, 255, 0.85);
        transition:
          color 0.3s ease,
          text-shadow 0.3s ease; /* Faster transition for hover */
        cursor: default; /* Makes it feel like text, not a link */
      }

      /* Turns red ONLY when hovering */
      .homepage-content p.scroll-highlight:hover {
        color: #ff3e3e;
        text-shadow: 0 0 10px rgba(255, 62, 62, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <header class="page-header">
        <button
          class="menu-toggle"
          aria-expanded="false"
          aria-controls="main-menu"
          id="menu-toggle-btn"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </header>

      <nav class="main-nav" id="main-menu">
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="pictures.html">Pictures</a>
        <a href="shows.html">Shows</a>
        <a href="about.html">About</a>
      </nav>

      <div class="homepage-content">
        <h1 class="logo-container">
          <img
            src="assets/images/DirtyMicLogo4Mics.jpeg"
            alt="Dirty After Work Logo"
            class="main-logo"
          />
        </h1>
        <p class="scroll-highlight">and also a website.</p>
      </div>
    </div>

    <footer class="site-footer">
      <div class="social-links">
        <a
          href="https://dirtyafterwork.bandcamp.com/album/a-demo"
          target="_blank"
          >Bandcamp</a
        >
      </div>
      <p>&copy; 2026 Dirty After Work. All Rights Reserved.</p>
    </footer>

    <script src="shared.js" defer></script>
  </body>
